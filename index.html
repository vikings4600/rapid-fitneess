<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Rapid Fitness Website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap"
      rel="stylesheet"
    />

    <title>Rapid Fitness</title>

    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>

    <script defer="defer" src="static/js/main.1f8fece4.js"></script>
    <link href="static/css/main.a74246d6.css" rel="stylesheet" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <script>
      document.addEventListener("submit", function (e) {
        e.preventDefault();
        const form = e.target;
        const data = new FormData(form);
        fetch("https://formspree.io/f/xdapnrpg", {
          method: "POST",
          body: data,
          headers: { Accept: "application/json" },
        })
          .then(() => {
            alert("Message sent successfully!");
            form.reset();
          })
          .catch(() => {
            alert("Error sending message");
          });
      });
    </script>
  </body>
</html>
